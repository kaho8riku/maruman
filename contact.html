  <main class="contact-page">
    <div class="container contact-container">
      
      <div class="contact-header">
        <h1 class="contact-title">お問い合わせ</h1>
        
        <div class="contact-tel-fax">
          <div class="tel-fax-label">電 話<br>FAX</div>
          <div class="tel-fax-num">046-881-5719</div>

      <h2 class="contact-subtitle">フォームからのお問い合わせ</h2>

      <form action="https://api.web3forms.com/submit" method="POST" class="contact-form">
        
        <input type="hidden" name="access_key" value="e4609a19-da06-41fb-be79-227eb45483de">

          <label>メールアドレス<span class="req-star">★</span></label>
          <input type="email" name="メールアドレス" required>
        </div>

        <div class="form-group">
          <label>メッセージ<span class="req-star">★</span></label>
          <textarea name="メッセージ" rows="8" required></textarea>
        </div>

        <p class="privacy-notice">
          <a href="privacy.html">プライバシーポリシー</a>が適用されます。
        </p>

        <div class="submit-wrap">
          <button type="submit" class="btn-submit-green">送 信</button>
          <p class="req-note"><span class="req-star">★</span> は入力必須項目です</p>
        </div>
