<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>丸万木村農園</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/ress/dist/ress.min.css">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

    <script src="js/main.js" defer></script>
</head>
<body>
    <div class="page-transition-curtain"></div>

    <header class="hero">
      <div class="veg-wrapper">
        <img src="images/common/veg-1.svg" alt="キャベツ" class="veg veg-1">
        <img src="images/common/veg-2.svg" alt="小松菜" class="veg veg-2">
        <img src="images/common/veg-3.svg" alt="大根" class="veg veg-3">
        <img src="images/common/veg-4.svg" alt="玉ねぎ" class="veg veg-4">
        <img src="images/common/veg-5.svg" alt="スイカ" class="veg veg-5">
        <img src="images/common/veg-6.svg" alt="かぶ" class="veg veg-6">
        <img src="images/common/veg-7.svg" alt="メロン" class="veg veg-7">
      </div>
      
      <div class="scrolldown-indicator js-animate-scroll">
        <span>SCROLL</span>
        <div class="arrow">↓</div>
      </div>

      <div class="logo-wrapper">
        <img src="images/common/logo.svg" alt="万木村農園" class="logo-img">
      </div>
  </header>
</body>
</html>
